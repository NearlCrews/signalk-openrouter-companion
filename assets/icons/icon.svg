<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-openrouter-companion.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific colour with a small glyph. The badge is the only
  region that varies between sibling plugins.

  This variant's badge: violet (#7E57C2) with a routing-node glyph: a
  central hub linked to three peripheral nodes. The metaphor nods to
  OpenRouter's role as a router across many LLMs, and to the plugin's
  job of fanning vessel data out to a model and the result back into
  Signal K notifications. Violet is distinct from the sibling yellow
  (weather), orange (NMEA2000 emitter), and green (predecessor chat)
  badges, keeping the family visually separable at thumbnail size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="OpenRouter Companion plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (violet for routing/AI) -->
  <circle cx="388" cy="388" r="84" fill="#7E57C2" stroke="#FFFFFF" stroke-width="8"/>

  <!--
    Badge glyph: routing-node graph. Three peripheral nodes (top, lower-left,
    lower-right) linked to a central hub by short edges. Connectors are
    drawn first so the node disks sit on top and read cleanly. Geometry is
    laid out on a small triangle around the badge centre (388, 388).
  -->
  <g stroke="#1B3A4B" stroke-width="7" stroke-linecap="round" fill="none">
    <line x1="388" y1="388" x2="388" y2="350"/>
    <line x1="388" y1="388" x2="356" y2="416"/>
    <line x1="388" y1="388" x2="420" y2="416"/>
  </g>
  <g fill="#1B3A4B">
    <!-- Central hub node, slightly larger to read as the router -->
    <circle cx="388" cy="388" r="11"/>
    <!-- Three peripheral model nodes -->
    <circle cx="388" cy="346" r="9"/>
    <circle cx="352" cy="420" r="9"/>
    <circle cx="424" cy="420" r="9"/>
  </g>
</svg>
