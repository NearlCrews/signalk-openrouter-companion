<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-openrouter-companion.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific colour with a small glyph. The badge is the only
  region that varies between sibling plugins.

  This variant's badge: violet (#7E57C2) with a chat bubble carrying a
  white four-point sparkle. The bubble is the plugin's voice (LLM
  reports and alerts narrated into Signal K notifications) and the
  sparkle is the AI doing the narrating. Violet is distinct from the
  sibling yellow (weather), orange (NMEA 2000 emitter), and crimson
  (Crow's Nest lighthouse) badges, keeping the family visually
  separable at thumbnail size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="OpenRouter Companion plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (violet for AI narration) -->
  <circle cx="388" cy="388" r="84" fill="#7E57C2" stroke="#FFFFFF" stroke-width="8"/>

  <!--
    Badge glyph: rounded chat bubble with a lower-left tail, filled in
    the family glyph dark (#1B3A4B), carrying a white four-point sparkle
    at its centre. Two shapes, so the "AI speaks" metaphor still reads
    at 32px. Laid out around the badge centre (388, 388).
  -->
  <path d="M 360 350 L 416 350 Q 444 350 444 378 L 444 390 Q 444 418 416 418 L 384 418 L 360 438 L 360 418 Q 332 418 332 390 L 332 378 Q 332 350 360 350 Z" fill="#1B3A4B"/>
  <path d="M 388 360 L 395 377 L 412 384 L 395 391 L 388 408 L 381 391 L 364 384 L 381 377 Z" fill="#FFFFFF"/>
</svg>
